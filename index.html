<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de Salsas — Chamberí Brothers</title>
  <style>
    :root {
      --bg-0:#0e0f13; --bg-1:#15171d; --bg-2:#1c1f27; --bg-3:#262a34;
      --border:#2c313c; --border-2:#3a4150;
      --text:#e7e9ee; --text-2:#9aa1b1; --text-3:#6b7280;
      --accent:#e9b44c; --accent-2:#c98f2c; --green:#56c08d; --yellow:#e3c05a; --red:#e07a6e;
      --radius:14px; --radius-sm:9px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg-0); color:var(--text); line-height:1.45; padding:24px 16px 64px; max-width:760px; margin:0 auto; -webkit-font-smoothing:antialiased; }
    h1 { font-size:21px; font-weight:700; letter-spacing:-.02em; }
    .sub { color:var(--text-2); font-size:13px; margin-top:3px; }
    .src-pill { display:inline-block; margin-top:8px; font-size:11px; color:var(--text-3); background:var(--bg-1); border:1px solid var(--border); padding:3px 9px; border-radius:999px; }
    .selector { display:flex; flex-wrap:wrap; gap:8px; margin:20px 0 18px; }
    .chip { display:flex; align-items:center; gap:7px; padding:9px 14px; cursor:pointer; background:var(--bg-1); border:1px solid var(--border); border-radius:999px; font-size:14px; font-weight:600; color:var(--text-2); transition:.12s; }
    .chip:hover { border-color:var(--border-2); color:var(--text); }
    .chip.active { background:var(--accent); border-color:var(--accent); color:#1a1407; }
    .chip .em { font-size:16px; }
    .card { background:var(--bg-1); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:16px; }
    .card-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:4px; }
    .card-title { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:700; }
    .card-title .em { font-size:24px; }
    .cat { font-size:11px; color:var(--text-2); background:var(--bg-3); padding:3px 9px; border-radius:999px; }
    .notas { color:var(--text-2); font-size:13px; margin-top:8px; }
    .alg { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .alg span { font-size:11px; background:var(--bg-2); border:1px solid var(--border); padding:2px 8px; border-radius:999px; color:var(--text-2); }
    .control { display:flex; align-items:center; gap:14px; margin:6px 0 2px; flex-wrap:wrap; }
    .control-label { font-size:13px; color:var(--text-2); }
    .stepper { display:flex; align-items:center; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
    .stepper button { width:42px; height:42px; border:none; background:transparent; color:var(--text); font-size:22px; cursor:pointer; transition:.1s; }
    .stepper button:hover { background:var(--bg-3); }
    .stepper input { width:64px; height:42px; border:none; background:transparent; color:var(--text); text-align:center; font-size:18px; font-weight:700; -moz-appearance:textfield; }
    .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; }
    .quick { display:flex; gap:6px; }
    .quick button { padding:6px 11px; font-size:12px; background:var(--bg-2); border:1px solid var(--border); border-radius:999px; color:var(--text-2); cursor:pointer; }
    .quick button:hover { border-color:var(--border-2); color:var(--text); }
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-top:16px; }
    .stat { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; text-align:center; }
    .stat-val { font-size:19px; font-weight:700; letter-spacing:-.02em; }
    .stat-label { font-size:11px; color:var(--text-2); margin-top:3px; }
    .stat.semaforo .stat-val { font-size:15px; }
    .col-title { font-size:13px; font-weight:700; color:var(--text-2); text-transform:uppercase; letter-spacing:.04em; margin:4px 0 10px; }
    .ing { display:grid; grid-template-columns:1fr 92px 76px; align-items:baseline; gap:12px; padding:7px 0; border-bottom:1px solid var(--border); }
    .ing:last-child { border-bottom:none; }
    .ing-name { font-size:14px; min-width:0; }
    .ing-name .ex { color:var(--yellow); font-size:11px; margin-left:5px; }
    .ing-qty { font-size:14px; font-weight:600; white-space:nowrap; text-align:right; font-variant-numeric:tabular-nums; }
    .ing-cost { font-size:12px; color:var(--text-3); text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums; }
    .ing-foot { display:grid; grid-template-columns:1fr 76px; gap:12px; padding-top:11px; margin-top:4px; font-weight:700; font-size:14px; }
    .ing-foot span:last-child { text-align:right; font-variant-numeric:tabular-nums; }
    .sens { display:flex; flex-direction:column; gap:9px; }
    .sens-row { display:flex; align-items:center; gap:10px; }
    .sens-label { font-size:13px; color:var(--text-2); width:110px; }
    .sens-bar { flex:1; height:8px; background:var(--bg-3); border-radius:999px; overflow:hidden; }
    .sens-fill { height:100%; background:linear-gradient(90deg,var(--accent-2),var(--accent)); border-radius:999px; }
    ol.metodo { padding-left:20px; display:flex; flex-direction:column; gap:7px; }
    ol.metodo li { font-size:13.5px; padding-left:4px; } ol.metodo li::marker { color:var(--accent); font-weight:700; }
    .lote-strip { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }
    .lote-label { font-size:13px; font-weight:700; color:var(--text-2); }
    .lote-inp { height:38px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); padding:0 11px; font-size:13px; }
    #lote-fecha { width:150px; } #lote-autor { width:150px; }
    .lote-inp:focus { outline:none; border-color:var(--accent); }
    .btn { height:38px; padding:0 16px; border:1px solid var(--border-2); background:var(--bg-3); color:var(--text); border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; transition:.12s; }
    .btn:hover { background:var(--border-2); }
    .btn-accent { background:var(--accent); border-color:var(--accent); color:#1a1407; }
    .btn-accent:hover { background:var(--accent-2); }
    .lote-result { display:none; align-items:center; gap:9px; margin-top:12px; padding:11px 14px; background:var(--bg-2); border:1px dashed var(--accent-2); border-radius:var(--radius-sm); }
    .lote-result.visible { display:flex; }
    .lote-num { font-size:16px; font-weight:700; letter-spacing:.02em; font-family:ui-monospace,Menlo,monospace; color:var(--accent); }
    .resumen-box { margin-top:12px; }
    pre.resumen { background:var(--bg-0); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; font-size:12px; color:var(--text-2); white-space:pre-wrap; font-family:ui-monospace,Menlo,monospace; max-height:230px; overflow:auto; }
    .warn { font-size:12px; color:var(--yellow); background:rgba(227,192,90,.08); border:1px solid rgba(227,192,90,.25); border-radius:var(--radius-sm); padding:9px 12px; margin-top:12px; }
    #toast { position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px); opacity:0; pointer-events:none; background:var(--accent); color:#1a1407; font-weight:600; font-size:13px; padding:10px 18px; border-radius:999px; transition:.25s; z-index:50; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    @media (max-width:560px){ .stats{ grid-template-columns:repeat(2,1fr); } #lote-fecha,#lote-autor{ width:100%; } }
  </style>
</head>
<body>
  <header>
    <h1>🧮 Calculadora de Salsas</h1>
    <div class="sub">Chamberí Brothers — producción de salsas en biberón · unidad base = 1 biberón (1 L)</div>
    <span class="src-pill" id="src-pill">Datos: Notion</span>
  </header>

  <div class="selector" id="selector"></div>
  <div class="card" id="card-receta"></div>

  <div class="card">
    <div class="col-title">🧾 Ingredientes para la producción</div>
    <div id="ingredientes"></div>
  </div>
  <div class="card">
    <div class="col-title">🌶 Perfil sensorial</div>
    <div class="sens" id="sensorial"></div>
  </div>
  <div class="card" id="card-metodo" style="display:none">
    <div class="col-title">📋 Método</div>
    <ol class="metodo" id="metodo"></ol>
  </div>

  <div class="card">
    <div class="col-title">🏷️ Lote de producción</div>
    <div class="lote-strip">
      <span class="lote-label">Nº Lote</span>
      <input type="date" id="lote-fecha" class="lote-inp" />
      <input type="text" id="lote-autor" class="lote-inp" placeholder="Encargado" list="autores" autocomplete="off" />
      <datalist id="autores"></datalist>
      <button class="btn btn-accent" onclick="generarLote()">🚀 Generar lote</button>
    </div>
    <div class="lote-result" id="lote-result">
      <span class="lote-num" id="lote-num"></span>
      <button class="btn" onclick="copiarLote()">📋 Copiar</button>
    </div>
    <div class="resumen-box">
      <pre class="resumen" id="resumen"></pre>
      <button class="btn" style="margin-top:10px" onclick="copiarResumen()">📋 Copiar resumen para PRODUCCIONES</button>
    </div>
  </div>

  <div id="toast"></div>

  <script src="data.js"></script>
  <script>
  const DATA = window.SALSAS_DATA || { _meta:{}, salsas:[] };
  const META = DATA._meta || {};
  const PREFIX = META.lotePrefix || "CB";
  let currentId = (DATA.salsas[0]||{}).id;
  let bibs = 1;

  const fmt = (n,d=2)=> (Number(n)||0).toFixed(d).replace(".",",");
  const eur = (n,d=2)=> fmt(n,d)+" €";
  const wt  = n => n>=1000 ? fmt(n/1000,2)+" kg" : (Math.round(n*10)/10)+" g";
  const vol = n => n>=1000 ? fmt(n/1000,2)+" L"  : (Math.round(n*10)/10)+" ml";
  const med = (n,u)=> u==="ml" ? vol(n) : wt(n);
  const cur = () => DATA.salsas.find(s=>s.id===currentId) || DATA.salsas[0];
  function isoDate(d){ return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`; }
  function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200); }

  function calc(s, n){
    const costeIngPorBib = s.ingredientes.reduce((a,i)=>a + i.cantidad*(i.costePorUnidad||0), 0); // €/biberón (1 L)
    const costeLote = costeIngPorBib * n;
    const costePorL = costeIngPorBib;
    const costePorBurger = (costeIngPorBib/1000) * (s.sxb||35);
    const pvp = s.pvpSalsero || 0;
    const margen = pvp ? pvp - costePorBurger : 0;
    const fc = pvp ? (costePorBurger/pvp)*100 : 0;
    const sem = !pvp ? "—" : fc<=28 ? "🟢 Óptimo" : fc<=33 ? "🟡 Atención" : "🔴 Alto";
    const burgers = Math.floor((n*1000)/(s.sxb||35));
    return { costeIngPorBib, costeLote, costePorL, costePorBurger, margen, fc, sem, pvp, burgers };
  }

  function renderSelector(){
    document.getElementById("selector").innerHTML = DATA.salsas.map(s=>
      `<div class="chip ${s.id===currentId?"active":""}" onclick="selectSalsa('${s.id}')"><span class="em">${s.emoji||"🧂"}</span>${s.nombre}</div>`).join("");
  }
  function selectSalsa(id){ currentId=id; bibs=1; render(); }
  function setBibs(v){ bibs=Math.max(1,Math.min(999,Math.round(v)||1)); render(); }
  function adj(d){ setBibs(bibs+d); }

  function render(){
    const s=cur(); if(!s) return; const c=calc(s,bibs);
    renderSelector();
    document.getElementById("src-pill").textContent = "Datos: " + (META.fuente || "Notion");
    document.getElementById("card-receta").innerHTML = `
      <div class="card-head">
        <div class="card-title"><span class="em">${s.emoji||"🧂"}</span>${s.nombre}</div>
      </div>
      ${s.notas?`<div class="notas">${s.notas}</div>`:""}
      ${(s.alergenos&&s.alergenos.length)?`<div class="alg">${s.alergenos.map(a=>`<span>${a}</span>`).join("")}</div>`:""}
      <div class="control">
        <span class="control-label">Biberones (1 L) a producir</span>
        <div class="stepper"><button onclick="adj(-1)">−</button>
          <input type="number" value="${bibs}" min="1" onchange="setBibs(this.value)" /><button onclick="adj(1)">+</button></div>
        <div class="quick"><button onclick="setBibs(1)">1</button><button onclick="setBibs(5)">5</button><button onclick="setBibs(10)">10</button></div>
        <span class="control-label">≈ ${c.burgers} burgers (${s.sxb||35} g/burger)</span>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-val">${eur(c.costeLote)}</div><div class="stat-label">Coste lote (ingred.)</div></div>
        <div class="stat"><div class="stat-val">${eur(c.costePorL)}</div><div class="stat-label">Coste / biberón (L)</div></div>
        <div class="stat"><div class="stat-val">${eur(c.costePorBurger,3)}</div><div class="stat-label">Coste / burger</div></div>
        <div class="stat semaforo"><div class="stat-val">${c.sem}</div><div class="stat-label">Food Cost ${s.pvpSalsero?fmt(c.fc,1)+"%":""}</div></div>
      </div>`;

    const rows = s.ingredientes.map(i=>{
      const q=i.cantidad*bibs, cost=i.cantidad*(i.costePorUnidad||0)*bibs;
      return `<div class="ing"><span class="ing-name">${i.nombre}${i.ejemplo?'<span class="ex">coste ej.</span>':""}</span>
        <span class="ing-qty">${med(q,i.unidad)}</span><span class="ing-cost">${eur(cost)}</span></div>`;
    }).join("");
    const hayEj = s.ingredientes.some(i=>i.ejemplo);
    document.getElementById("ingredientes").innerHTML = rows +
      `<div class="ing-foot"><span>Coste ingredientes (${bibs} biberón${bibs>1?"es":""})</span><span>${eur(c.costeLote)}</span></div>` +
      (hayEj ? `<div class="warn">⚠️ Algunos costes son de <b>ejemplo</b> (faltan en Notion: CANT. PACK). Rellénalos en INVENTARIO y vuelve a sincronizar para costes reales.</div>` : "");

    const maxS=8;
    document.getElementById("sensorial").innerHTML = Object.entries(s.sensorial||{}).map(([k,v])=>
      `<div class="sens-row"><span class="sens-label">${k}</span><div class="sens-bar"><div class="sens-fill" style="width:${Math.min(100,(v/maxS)*100)}%"></div></div></div>`).join("")
      || `<div class="notas">Sin perfil sensorial en Notion todavía.</div>`;

    const met = s.metodo||[];
    document.getElementById("card-metodo").style.display = met.length ? "" : "none";
    document.getElementById("metodo").innerHTML = met.map(x=>`<li>${x}</li>`).join("");
    renderResumen();
  }

  function getCounter(){ const t=isoDate(new Date());
    if(localStorage.getItem("cb_batch_date")!==t){ localStorage.setItem("cb_batch_date",t); localStorage.setItem("cb_batch_count","0"); return 0; }
    return parseInt(localStorage.getItem("cb_batch_count")||"0",10); }
  function incCounter(){ const t=isoDate(new Date()); const n=getCounter()+1; localStorage.setItem("cb_batch_date",t); localStorage.setItem("cb_batch_count",String(n)); return n; }
  function loteActual(){ return document.getElementById("lote-num").textContent || "(sin generar)"; }
  function generarLote(){
    const fv=document.getElementById("lote-fecha").value, fecha=fv?fv.replaceAll("-",""):isoDate(new Date());
    const lote=`${PREFIX}-${fecha}-${String(incCounter()).padStart(3,"0")}`;
    document.getElementById("lote-num").textContent=lote;
    document.getElementById("lote-result").classList.add("visible");
    const a=document.getElementById("lote-autor").value.trim();
    if(a){ const p=JSON.parse(localStorage.getItem("cb_autores")||"[]"); if(!p.includes(a)){ p.push(a); localStorage.setItem("cb_autores",JSON.stringify(p)); renderAutores(); } }
    toast(`Lote ${lote} generado`); renderResumen();
  }
  function copiarLote(){ const l=document.getElementById("lote-num").textContent; if(l) copy(l,"Lote copiado"); }
  function renderResumen(){
    const s=cur(); if(!s) return; const c=calc(s,bibs);
    const fv=document.getElementById("lote-fecha").value, fecha=fv||new Date().toISOString().slice(0,10);
    const autor=document.getElementById("lote-autor").value.trim()||"—";
    document.getElementById("resumen").textContent =
`LOTE: ${loteActual()}
Salsa: ${s.emoji} ${s.nombre}
Fecha: ${fecha}   Encargado: ${autor}
Biberones (1 L): ${bibs}   ≈ ${c.burgers} burgers
Coste lote: ${eur(c.costeLote)}   Coste/biberón: ${eur(c.costePorL)}   Coste/burger: ${eur(c.costePorBurger,3)}
PVP salsero: ${s.pvpSalsero?eur(s.pvpSalsero):"—"}   Food Cost: ${s.pvpSalsero?fmt(c.fc,1)+"% "+c.sem:"—"}
— Ingredientes —
${s.ingredientes.map(i=>`· ${i.nombre}: ${med(i.cantidad*bibs,i.unidad)}`).join("\n")}`;
  }
  function copiarResumen(){ copy(document.getElementById("resumen").textContent,"Resumen copiado"); }
  function copy(t,m){ if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast(m)).catch(()=>fb(t,m)); } else fb(t,m); }
  function fb(t,m){ const a=document.createElement("textarea"); a.value=t; document.body.appendChild(a); a.select(); try{document.execCommand("copy");toast(m);}catch(e){} a.remove(); }
  function renderAutores(){ const a=JSON.parse(localStorage.getItem("cb_autores")||"[]"); document.getElementById("autores").innerHTML=a.map(x=>`<option value="${x}">`).join(""); }

  document.getElementById("lote-fecha").value=new Date().toISOString().slice(0,10);
  document.getElementById("lote-autor").addEventListener("input",renderResumen);
  document.getElementById("lote-fecha").addEventListener("change",renderResumen);
  renderAutores();
  if(!DATA.salsas.length){ document.body.insertAdjacentHTML("beforeend","<p style='color:var(--red)'>No hay datos. Ejecuta <code>node sync-notion.mjs</code>.</p>"); }
  else render();
  </script>
</body>
</html>
