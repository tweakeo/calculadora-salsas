name: Sync desde Notion

# Regenera data.js leyendo Notion (solo recetas con ESTADO = DESARROLLADA) y,
# si hay cambios, los commitea. GitHub Pages se redespliega solo.
#
# Sincronización MANUAL (no hay disparo automático). Se lanza de 2 formas:
#  1) workflow_dispatch → botón "Run workflow" en la pestaña Actions de GitHub
#  2) repository_dispatch (event_type: sync-notion) → botón de Notion a través
#     de un relay (ver README).

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-notion]

permissions:
  contents: write

concurrency:
  group: sync-notion
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generar data.js desde Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node sync-notion.mjs
      - name: Commit y push si data.js cambió
        run: |
          if [[ -n "$(git status --porcelain data.js)" ]]; then
            git config user.name  "notion-sync[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "sync: data.js desde Notion ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          else
            echo "Sin cambios en data.js."
          fi
